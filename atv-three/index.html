<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 03 – Variáveis e Operadores</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        article {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: black;
            font-size: 24px;
        }

        p {
            color: gray;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <article>
        <h1>Aula 03 – Variáveis e Operadores</h1>
        <p>Meu nome é Sarah e tenho 19 anos.</p>

        <h2>Calculos</h2>
        <p>A soma de 1 e 9 é: 10</p>
        <p>A subtração de 9 e 1 é: 8</p>
        <p>A multiplicação de 1 e 9 é: 9</p>
        <p>A divisão de 9 por 1 é: 9</p>
    </article>
</body>
</html>
